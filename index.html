<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Photo & Video Studio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🎨 AI Photo & Video Studio</h1>
<p>Edit Photos & Videos Like a Pro</p>
</header>

<section class="card">

<h2>📷 Photo Editor</h2>

<input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">

<br><br>

<img id="preview" src="" style="max-width:100%;display:none;border-radius:10px;">

<br><br>

<div class="tools">

<button onclick="rotateLeft()">⤺ Rotate Left</button>

<button onclick="rotateRight()">⤻ Rotate Right</button>

<button onclick="zoomIn()">🔍 Zoom In</button>

<button onclick="zoomOut()">🔎 Zoom Out</button>

</div>

<br>

<label>Brightness</label>
<input type="range" id="brightness" min="50" max="150" value="100" oninput="updateFilters()">

<label>Contrast</label>
<input type="range" id="contrast" min="50" max="150" value="100" oninput="updateFilters()">

<label>Saturation</label>
<input type="range" id="saturation" min="0" max="200" value="100" oninput="updateFilters()">

<br><br>

<button onclick="downloadImage()">⬇ Download Image</button>

<button onclick="resetImage()">🔄 Reset</button>

</section>

<footer>
<p>© 2026 AI Photo & Video Studio</p>
<p><b>Editing by Ashish Kumar, Security Guard</b></p>
</footer>

<script src="script.js"></script>

</body>
</html>
